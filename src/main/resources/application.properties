spring.application.name=order-service

# Order Service runs on 8081 (Product Service uses 8080)
server.port=8081

# --- Database (order_db on host port 5434) ---
# Credentials come from environment variables; the part after ":" is a local default.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/order_db}
spring.datasource.username=${DB_USERNAME:order_user}
spring.datasource.password=${DB_PASSWORD:order_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- RabbitMQ (where we publish order events) ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# --- Product Service base URL (used by WebClient to fetch product details) ---
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8080}

# --- Swagger UI: http://localhost:8081/swagger-ui.html ---
springdoc.swagger-ui.path=/swagger-ui.html
